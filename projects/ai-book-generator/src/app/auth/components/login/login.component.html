<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">University Books</h1>
    <p class="auth-subtitle">Sign in to continue</p>

    @if (loginState$ | async; as state) {
      <form
        class="auth-form"
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()">
        <app-counter-field
          label="Email"
          type="email"
          required
          placeholder="you@example.com"
          [value]="email?.value ?? ''"
          [error]="emailError"
          (valueChange)="email?.setValue($event)"
          (blurred)="email?.markAsTouched()" />

        <app-counter-field
          label="Password"
          type="password"
          required
          placeholder="Enter your password"
          [value]="password?.value ?? ''"
          [error]="passwordError"
          (valueChange)="password?.setValue($event)"
          (blurred)="password?.markAsTouched()" />

        <!-- Error Message -->
        @if (state.error) {
          <div class="auth-alert auth-alert--error">
            {{ state.error }}
          </div>
        }

        <!-- Submit Button -->
        <button
          type="submit"
          class="auth-btn auth-btn--primary"
          [disabled]="state.loading || loginForm.invalid">
          @if (state.loading) {
            <span class="auth-spinner"></span>
            <span>Signing in...</span>
          } @else {
            <span>Sign In</span>
          }
        </button>
      </form>
    }

    <!-- Footer -->
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Sign up</a></p>
      <p><a routerLink="/auth/forgot-password">Forgot password?</a></p>
    </div>
  </div>
</div>
