@if (template(); as templateId) {
  <!-- Step: personalizzazione del modello (componente di servizio, stesso URL) -->
  <app-model-setup [templateId]="templateId" (back)="clearTemplate()" />
} @else {
  <!-- Step: galleria modelli -->
  <div class="create site-container">
    <header class="create__head">
      <h1 class="page-title">{{ 'i18n.Create.gallery.title' | translate }}</h1>
      <p class="create__lead">{{ 'i18n.Create.callout.title' | translate }}</p>
    </header>

    <div class="create__grid">
      @for (card of cards(); track card.id) {
        <app-choice-card
          [imageSrc]="card.imageSrc"
          [icon]="card.icon"
          [tone]="card.tone"
          [heading]="card.heading"
          [description]="card.description"
          [tags]="card.tags"
          (activate)="chooseModel(card.id)" />
      }
    </div>
  </div>
}
