<app-auth-shell>
  <!-- Sezione 1 — Definisci (banda bianca) -->
  <section class="band">
    <div class="site-container band__inner">
      <button class="ms-back" type="button" (click)="back()">
        <mat-icon fontSet="material-symbols-outlined" aria-hidden="true">arrow_back</mat-icon>
        {{ 'i18n.Setup.back' | translate }}
      </button>

      <header class="s1-head">
        <span class="s1-step">
          <span class="s1-step__num">1</span>
          <span class="s1-step__eyebrow">{{ 'i18n.Setup.S1.eyebrow' | translate }}</span>
        </span>
        <h1 class="s1-title">{{ s1Title() }}</h1>
        <p class="s1-subtitle">{{ s1Subtitle() }}</p>
      </header>

      <div class="s1-grid">
        <!-- Form -->
        <div class="s1-form">
          <div class="s1-field">
            <div class="s1-field__top">
              <label class="s1-field__label" for="ms-title">
                {{ s1TitleLabel() }} <span class="s1-field__req">*</span>
              </label>
              <span class="s1-field__counter">{{ title().length }}/{{ titleMax }}</span>
            </div>
            <input
              id="ms-title"
              class="s1-input"
              type="text"
              [attr.maxlength]="titleMax"
              [value]="title()"
              (input)="title.set($any($event.target).value)"
              [placeholder]="'i18n.Setup.S1.titlePlaceholder' | translate" />
          </div>

          <div class="s1-field">
            <div class="s1-field__top">
              <label class="s1-field__label" for="ms-desc">
                {{ s1DescLabel() }}
                <span class="s1-field__optional">{{ 'i18n.Setup.S1.optional' | translate }}</span>
              </label>
              <span class="s1-field__counter">{{ description().length }}/{{ descMax }}</span>
            </div>
            <textarea
              id="ms-desc"
              class="s1-input s1-textarea"
              rows="5"
              [attr.maxlength]="descMax"
              [value]="description()"
              (input)="description.set($any($event.target).value)"
              [placeholder]="s1DescPlaceholder()"></textarea>
          </div>
        </div>

        <!-- Anteprima dal vivo: il libro riflette il titolo -->
        <aside class="s1-preview">
          <div class="s1-book cover-art cover-art--{{ template()?.coverTheme ?? 'ocean' }}">
            <span class="s1-book__kicker">{{ modelName() }}</span>
            <span class="s1-book__title" [class.is-placeholder]="!title().trim()">
              {{ title().trim() || ('i18n.Setup.untitled' | translate) }}
            </span>
            <span class="s1-book__brand">SCADÁ</span>
          </div>
          <span class="s1-preview__hint">{{ 'i18n.Setup.S1.previewHint' | translate }}</span>
        </aside>
      </div>
    </div>
  </section>
</app-auth-shell>
