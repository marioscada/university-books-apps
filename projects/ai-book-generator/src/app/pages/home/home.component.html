<app-auth-shell>
  <!-- Hero full-bleed (stile mariosite, stili globali in hero-section). -->
  <app-hero-section [data]="hero()" />

  <section class="dash">
    <div class="site-container dash__inner">
      <div class="dash__block">
        <div class="dash__block-head">
          <h2 class="dash__block-title">Recent Projects</h2>
          <a class="dash__link" routerLink="/collection">Vedi tutti</a>
        </div>
        <div class="grid">
          @for (project of recentProjects(); track project.id) {
            <a class="card card--link" [routerLink]="project.route">
              <span class="card__icon" aria-hidden="true">
                <mat-icon fontSet="material-symbols-outlined">{{ project.icon }}</mat-icon>
              </span>
              <div class="card__body">
                <h3 class="card__title">{{ project.title }}</h3>
                <p class="card__meta">{{ project.kindLabel }}</p>
              </div>
            </a>
          }
        </div>
      </div>

      <div class="dash__block">
        <div class="dash__block-head">
          <h2 class="dash__block-title">Recent Sources</h2>
          <a class="dash__link" routerLink="/library">Vedi tutte</a>
        </div>
        <div class="grid">
          @for (source of recentSources(); track source.id) {
            <a class="card card--link" routerLink="/library">
              <span class="card__icon" aria-hidden="true">
                <mat-icon fontSet="material-symbols-outlined">{{ source.icon }}</mat-icon>
              </span>
              <div class="card__body">
                <h3 class="card__title">{{ source.name }}</h3>
                <p class="card__meta">{{ source.typeLabel }}</p>
              </div>
            </a>
          }
        </div>
      </div>
    </div>
  </section>
</app-auth-shell>
