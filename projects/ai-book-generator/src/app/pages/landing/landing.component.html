<!--
  Landing pubblica — vetrina. Header minimale (logo + Login + Sign Up),
  contenuto vetrina, footer. Ogni CTA porta alla login.
-->
<app-site-shell>
  <ng-template #header>
    <app-site-header-nav
      [brand]="brand"
      [showAuthLinks]="true" />
  </ng-template>

  <ng-template #main>
    <!-- 1. Hero -->
    <app-hero-section [data]="hero" />

    <!-- 2. Cosa ottieni — formati disponibili -->
    <app-output-types
      eyebrow="Cosa puoi creare"
      title="Un solo strumento, tanti formati"
      [items]="outputTypes" />

    <!-- 3. Come funziona (sfondi alternati automatici) -->
    @for (section of howItWorks; track section.id) {
      <app-content-section [data]="section" />
    }

    <!-- 4. Esempi reali -->
    <app-output-showcase
      eyebrow="Esempi reali"
      title="Ecco cosa otterrai"
      [items]="showcase" />

    <!-- 5. CTA finale (banda scura) -->
    <app-content-section class="cta-band" [data]="finalCta" />
  </ng-template>

  <ng-template #footer>
    <app-site-footer-block [brand]="brand" [columns]="footerColumns" />
  </ng-template>
</app-site-shell>
