<div
  class="source-dropzone__area"
  [class.is-dragging]="dragging()"
  role="button"
  tabindex="0"
  (click)="browse()"
  (keydown.enter)="onKey($event)"
  (keydown.space)="onKey($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)">
  <span class="source-dropzone__icon" aria-hidden="true">
    <mat-icon fontSet="material-symbols-outlined">cloud_upload</mat-icon>
  </span>
  <span class="source-dropzone__prompt">{{ promptLabel() }}</span>
  @if (hintLabel()) {
    <span class="source-dropzone__hint">{{ hintLabel() }}</span>
  }
  <input
    #fileInput
    class="source-dropzone__input"
    type="file"
    multiple
    [attr.accept]="accept() || null"
    (change)="onSelected($event)" />
</div>

@if (items().length) {
  <mat-chip-set class="source-dropzone__chips" aria-label="Allegati">
    @for (item of items(); track item.id) {
      <mat-chip-row
        [attr.data-status]="item.status || 'ready'"
        [removable]="removable()"
        (removed)="itemRemove.emit(item.id)">
        @switch (item.status) {
          @case ('uploading') {
            <mat-progress-spinner matChipAvatar mode="indeterminate" [diameter]="18" />
          }
          @case ('error') {
            <mat-icon matChipAvatar class="source-dropzone__state--error" fontSet="material-symbols-outlined">error</mat-icon>
          }
          @default {
            <mat-icon matChipAvatar class="source-dropzone__state--ready" fontSet="material-symbols-outlined">check_circle</mat-icon>
          }
        }
        {{ item.name }}
        @if (removable()) {
          <button matChipRemove [attr.aria-label]="'Rimuovi ' + item.name">
            <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
          </button>
        }
      </mat-chip-row>
    }
  </mat-chip-set>
}
