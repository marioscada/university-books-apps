<header class="chapter-reader__head">
  @if (documentTitle()) {
    <span class="chapter-reader__doc">{{ documentTitle() }}</span>
  }
  <div class="chapter-reader__titlerow">
    <h2 class="chapter-reader__title">{{ title() }}</h2>
    @if (statusLabel()) {
      <span
        class="chapter-reader__status"
        [attr.data-tone]="statusTone()"
        >{{ statusLabel() }}</span
      >
    }
    @if (expandable()) {
      <button
        class="chapter-reader__expand"
        type="button"
        aria-label="Apri a schermo intero"
        (click)="expand.emit()">
        <mat-icon fontSet="material-symbols-outlined">open_in_full</mat-icon>
      </button>
    }
  </div>
  @if (meta()) {
    <p class="chapter-reader__meta">{{ meta() }}</p>
  }
</header>

<div
  class="chapter-reader__divider"
  role="presentation"></div>

<div class="chapter-reader__body">
  <app-prose [blocks]="paragraphs()" />
  <ng-content />
</div>

@if (prevLabel() || nextLabel() || actionLabel()) {
  <div
    class="chapter-reader__divider"
    role="presentation"></div>
  <footer class="chapter-reader__foot">
    <nav class="chapter-reader__nav">
      @if (prevLabel()) {
        <button
          class="chapter-reader__navlink"
          type="button"
          (click)="prev.emit()">
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
            >chevron_left</mat-icon
          >
          <span class="chapter-reader__navlabel">{{ prevLabel() }}</span>
        </button>
      }
      @if (nextLabel()) {
        <button
          class="chapter-reader__navlink chapter-reader__navlink--next"
          type="button"
          (click)="next.emit()">
          <span class="chapter-reader__navlabel">{{ nextLabel() }}</span>
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
            >chevron_right</mat-icon
          >
        </button>
      }
    </nav>
    @if (actionLabel()) {
      <button
        class="chapter-reader__action"
        type="button"
        (click)="action.emit()">
        {{ actionLabel() }}
        @if (actionIcon()) {
          <mat-icon
            fontSet="material-symbols-outlined"
            aria-hidden="true"
            >{{ actionIcon() }}</mat-icon
          >
        }
      </button>
    }
  </footer>
}
