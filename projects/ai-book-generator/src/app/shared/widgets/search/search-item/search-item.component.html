<div
  class="search-item"
  [class.search-item-focused]="isFocused"
  role="option"
  tabindex="-1"
  [attr.aria-selected]="isFocused"
  (click)="onSelect()"
  (keydown.enter)="onSelect()"
>
  <!-- Icon -->
  <mat-icon
    class="search-item-icon"
    fontSet="material-symbols-outlined"
    aria-hidden="true"
  >{{ item.icon }}</mat-icon>

  <!-- Content -->
  <div class="search-item-content">
    <div class="search-item-title">
      {{ item.title }}
    </div>

    @if (item.subtitle || item.metadata) {
      <div class="search-item-meta">
        @if (item.subtitle) {
          <span class="search-item-subtitle">
            {{ item.subtitle }}
          </span>
        }
        @if (item.metadata) {
          <span class="search-item-metadata">
            {{ item.metadata }}
          </span>
        }
      </div>
    }
  </div>

  <!-- Badge -->
  @if (item.badge) {
    <span
      class="search-item-badge"
      [attr.data-badge-color]="item.badgeColor || 'medium'"
    >
      {{ item.badge }}
    </span>
  }

  <!-- "Jump to" hint (GitHub-style) -->
  <span class="search-item-hint">{{ jumpToHint }}</span>
</div>
