@if (item(); as link) {
  @if (link.route) {
    <a
      class="footer-link"
      [routerLink]="link.route"
      >{{ link.label | translate }}</a
    >
  } @else if (link.href) {
    <a
      class="footer-link"
      target="_blank"
      rel="noopener noreferrer"
      [href]="link.href"
      >{{ link.label | translate }}</a
    >
  }
}
