<header appScreenType [class.has-nav]="navItems().length > 0">
  <div class="site-container header-inner">
    <!-- SINISTRA: logo -->
    <a class="logo-link" [routerLink]="logoRoute()" [attr.aria-label]="brand()">
      <img class="logo-link__mark" src="images/logo.webp" [alt]="brand()" decoding="async" fetchpriority="high" />
    </a>

    <!-- CENTRO: voci di navigazione -->
    @if (navItems().length) {
      <nav class="nav-links" aria-label="Primary">
        @for (item of navItems(); track item.id) {
          <a [routerLink]="item.route" routerLinkActive="is-active" class="nav-link">{{ item.label | translate }}</a>
        }
      </nav>
    }

    <!-- DESTRA: azioni (search + language + login / avatar) -->
    <div class="header-zone-right">
      @if (showSearch()) {
        <button #searchBtn type="button" class="action-btn search-btn" (click)="onSearch(searchBtn)" aria-label="Search">
          <mat-icon fontSet="material-symbols-outlined" aria-hidden="true">search</mat-icon>
          <span class="search-btn__text">Type</span>
          <kbd class="search-btn__key">/</kbd>
          <span class="search-btn__text">to search</span>
        </button>
      }

      @if (showAuthLinks()) {
        <a routerLink="/auth/login" class="auth-link">Login</a>
        <a routerLink="/auth/register" class="site-cta-pill auth-cta">Sign Up</a>
      }

      @if (showProfile()) {
        <button type="button" class="profile-btn" (click)="onProfile()" aria-label="Profilo utente">
          <span class="avatar" aria-hidden="true">M</span>
        </button>
      }

      <!-- Language switcher (come mariosite) — per ultimo, dopo l'avatar -->
      <app-language-switcher
        [currentLocale]="currentLocale()"
        [locales]="locales"
        (localeChange)="onLocaleChange($event)" />
    </div>

    <!-- MOBILE: hamburger (visibile solo su isMedium/isSmall) -->
    <button type="button" class="hamburger-btn" aria-label="Apri menu" (click)="onToggle()">
      <mat-icon fontSet="material-symbols-outlined" aria-hidden="true">menu</mat-icon>
    </button>
  </div>
</header>
