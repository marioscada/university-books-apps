<!--
  AuthShell — shell autenticata riusabile. Le pagine proiettano il contenuto
  del corpo centrale tramite <ng-content>.
-->
<app-site-shell>
  <ng-template
    #header
    let-toggleSidebar="toggleSidebar">
    <app-site-header-nav
      logoRoute="/create"
      [brand]="brand"
      [navItems]="navItems"
      [showProfile]="true"
      (toggleSidebar)="toggleSidebar()"
      (profile)="onProfile()" />
  </ng-template>

  <ng-template
    #sidebar
    let-closeMenu="closeMenu">
    <app-site-mobile-menu
      [brand]="brand"
      [navItems]="navItems"
      (closeMenu)="closeMenu()" />
  </ng-template>

  <ng-template #main>
    <ng-content />
  </ng-template>

  <ng-template #footer>
    @if (showFooter()) {
      <app-site-footer-block
        [brand]="brand"
        [columns]="footerColumns"
        [showAuthOnly]="true" />
    }
  </ng-template>
</app-site-shell>

<!-- Sidebar profilo (overlay) — riuso del componente esistente. -->
@if (profileOpen()) {
  <app-user-profile-sidebar
    [user]="profileUser()"
    [loggingOut]="loggingOut()"
    [logoutError]="logoutError()"
    (closeSidebar)="onProfileClose()"
    (logout)="onProfileLogout()" />
}
