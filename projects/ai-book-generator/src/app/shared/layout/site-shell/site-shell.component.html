<!--
  Layout a scroll naturale di pagina (header sticky). Il drawer mobile è un
  overlay dichiarativo reso accessibile via CDK (focus-trap/scroll-block/ESC).
-->
@if (screenType(); as screenType) {
  <div class="site-shell">
    @if (headerTemplate(); as header) {
      <ng-container
        *ngTemplateOutlet="
          header;
          context: { toggleSidebar: toggleSidebar, screenType: screenType }
        "></ng-container>
    }

    <main class="site-shell__main">
      @if (mainTemplate(); as main) {
        <ng-container *ngTemplateOutlet="main"></ng-container>
      }
    </main>

    @if (footerTemplate(); as footer) {
      <ng-container *ngTemplateOutlet="footer"></ng-container>
    }

    <!-- Drawer mobile (overlay) -->
    @if (sidebarTemplate(); as sidebar) {
      @if (sidebarOpen()) {
        <button
          type="button"
          class="site-shell__backdrop"
          aria-label="Chiudi menu"
          (click)="closeSidebar()"></button>
        <aside
          class="site-shell__drawer"
          role="dialog"
          aria-modal="true"
          tabindex="-1"
          cdkTrapFocus
          [cdkTrapFocusAutoCapture]="true">
          <ng-container
            *ngTemplateOutlet="
              sidebar;
              context: { closeMenu: closeSidebar, screenType: screenType }
            "></ng-container>
        </aside>
      }
    }
  </div>
}
