<header class="summary-panel__header">
  <h3 class="summary-panel__title">{{ panelTitle() }}</h3>
  @if (badge()) {
    <span class="summary-panel__badge">{{ badge() }}</span>
  }
</header>

<div class="summary-panel__cover">
  <ng-content select="[cover]" />
</div>

@if (hasRows()) {
  <dl class="summary-panel__rows">
    @for (row of rows(); track $index) {
      <div class="summary-panel__row">
        <dt class="summary-panel__label">{{ row.label }}</dt>
        <dd class="summary-panel__value">{{ row.value }}</dd>
      </div>
    }
  </dl>
}

<div class="summary-panel__footer">
  <ng-content select="[footer]" />
</div>
