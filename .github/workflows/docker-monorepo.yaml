# =============================================================================
# Docker Monorepo - Build solo progetti modificati
# =============================================================================

name: Docker Monorepo Build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  # Detect quali progetti sono stati modificati
  detect-changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      ai-book-generator: ${{ steps.filter.outputs.ai-book-generator }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ai-book-generator:
              - 'projects/ai-book-generator/**'
              - 'libs/**'
              - 'package*.json'
              - 'angular.json'

  # Build University Books Mobile
  build-ai-book-generator:
    name: Build University Books Mobile
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-book-generator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build University Books Mobile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.monorepo
          push: false
          load: true
          tags: ai-book-generator:latest
          build-args: |
            PROJECT_NAME=ai-book-generator
            BUILD_CONFIGURATION=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test University Books Mobile
        run: |
          docker run -d -p 8080:80 --name test-ai-book-generator ai-book-generator:latest
          sleep 5
          curl -f http://localhost:8080/ || exit 1
          docker stop test-ai-book-generator

  # Summary
  build-summary:
    name: Build Summary
    needs: [detect-changes, build-ai-book-generator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Project | Changed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| University Books Mobile | ${{ needs.detect-changes.outputs.ai-book-generator }} | ${{ needs.build-ai-book-generator.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
